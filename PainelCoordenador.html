<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - MESC Pro Plus</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #1e3a8a; --bg: #f1f5f9; --success: #25d366; --pdf: #e11d48; --gold: #b45309; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 480px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 700; color: #475569; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-regra { background: var(--gold); color: white; }
        .btn-zap { background: var(--success); color: white; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .grid-ministros { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .signature { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--primary); margin:0;">COORDENADOR MESC</h2>
        <p style="color:#64748b;">Paróquia PNSPS - Maracanaú</p>
    </div>

    <label>Consultar Escala do Dia</label>
    <input type="date" id="dataConsulta">
    <button class="btn btn-zap" onclick="compartilharEscala()">📲 ENVIAR PARA WHATSAPP</button>

    <div style="margin: 20px 0; border-top: 1px solid #eee;"></div>

    <button class="btn btn-primary" onclick="abrirModal('modalEvento')">➕ NOVO EVENTO (EXTRA)</button>
    <button class="btn btn-regra" onclick="abrirModal('modalRegra')">⚙️ GERENCIAR REGRAS FIXAS</button>
    <div class="signature">By: Jr&Iz</div>
</div>

<div id="modalEvento" class="modal">
    <div class="modal-content">
        <button onclick="fecharModal('modalEvento')" style="border:none; background:none; font-weight:bold; color:var(--primary);">⬅ Voltar</button>
        <h3>Novo Evento Extra</h3>
        <label>Data</label> <input type="date" id="novaData">
        <label>Horário</label> <input type="time" id="novaHora">
        <label>Missa / Evento</label> <input type="text" id="novoEvento">
        <label>Ministros (Até 10)</label>
        <div class="grid-ministros">
            <input type="text" class="m-input" placeholder="1"> <input type="text" class="m-input" placeholder="2">
            <input type="text" class="m-input" placeholder="3"> <input type="text" class="m-input" placeholder="4">
            <input type="text" class="m-input" placeholder="5"> <input type="text" class="m-input" placeholder="6">
            <input type="text" class="m-input" placeholder="7"> <input type="text" class="m-input" placeholder="8">
            <input type="text" class="m-input" placeholder="9"> <input type="text" class="m-input" placeholder="10">
        </div>
        <label>Observações</label> <textarea id="obs" rows="2"></textarea>
        <button class="btn btn-primary" id="btnSalvar" onclick="salvarEscala('addEscala', 'modalEvento')">💾 SALVAR</button>
    </div>
</div>

<div id="modalRegra" class="modal">
    <div class="modal-content">
        <button onclick="fecharModal('modalRegra')" style="border:none; background:none; font-weight:bold; color:var(--gold);">⬅ Voltar</button>
        <h3>Regra Fixa</h3>
        <select id="regraFixo">
            <option value="1º Sábado">1º Sábado</option> <option value="2º Sábado">2º Sábado</option>
            <option value="3º Sábado">3º Sábado</option> <option value="4º Sábado">4º Sábado</option>
            <option value="1º Domingo">1º Domingo</option> <option value="2º Domingo">2º Domingo</option>
            <option value="3º Domingo">3º Domingo</option> <option value="4º Domingo">4º Domingo</option>
        </select>
        <label>Horário</label> <input type="time" id="horaFixo">
        <label>Evento</label> <input type="text" id="eventoFixo">
        <label>Ministros Fixos</label>
        <div class="grid-ministros">
            <input type="text" class="r-input" placeholder="1"> <input type="text" class="r-input" placeholder="2">
            <input type="text" class="r-input" placeholder="3"> <input type="text" class="r-input" placeholder="4">
            <input type="text" class="r-input" placeholder="5"> <input type="text" class="r-input" placeholder="6">
            <input type="text" class="r-input" placeholder="7"> <input type="text" class="r-input" placeholder="8">
            <input type="text" class="r-input" placeholder="9"> <input type="text" class="r-input" placeholder="10">
        </div>
        <button class="btn btn-regra" id="btnSalvarRegra" onclick="salvarEscala('addRegra', 'modalRegra')">💾 SALVAR REGRA</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbzwaZk-NZE0omqUf2PrU08c_-gi0H4yuxFqFFL7A5RKKilXSQcsBU-P-lAZMAd-vg0C/exec";

    function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

    // LIMPEZA AGRESSIVA DE QUEBRA DE LINHA
    function limparTotal(texto) {
        if (!texto) return "";
        return texto.toString().replace(/[\r\n]+/g, " ").replace(/\s\s+/g, " ").trim();
    }

    // EXTRAÇÃO DE HORA BLINDADA CONTRA O ERRO 10:06
    function extrairHora(valor) {
        if (!valor) return "00:00";
        let s = valor.toString();
        if (s.includes("T")) s = s.split("T")[1];
        const match = s.match(/\d{2}:\d{2}/);
        return match ? match[0] : s.substring(0, 5);
    }

    function dispararZap(texto) {
        const url = `whatsapp://send?text=${encodeURIComponent(texto)}`;
        window.location.href = url;
    }

    async function salvarEscala(acao, modalId) {
        const isExtra = modalId === 'modalEvento';
        const inputs = document.querySelectorAll(isExtra ? '.m-input' : '.r-input');
        const ministros = Array.from(inputs).map(i => limparTotal(i.value)).filter(v => v !== "").join(", ");
        
        const d = {
            data: isExtra ? document.getElementById('novaData').value : document.getElementById('regraFixo').value,
            hora: isExtra ? document.getElementById('novaHora').value : document.getElementById('horaFixo').value,
            missa: limparTotal(isExtra ? document.getElementById('novoEvento').value : document.getElementById('eventoFixo').value),
            ministro: ministros,
            obs: isExtra ? limparTotal(document.getElementById('obs').value) : ""
        };

        if (!d.hora || !d.missa) return alert("Preencha Horário e Missa!");
        const btn = document.getElementById(isExtra ? 'btnSalvar' : 'btnSalvarRegra');
        btn.innerText = "SALVANDO..."; btn.disabled = true;

        const payload = { action: acao, ...d };
        if (acao === 'addRegra') { payload.regra = d.data; delete payload.data; }

        try {
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Salvo!"); location.reload();
        } catch (e) { alert("Erro!"); btn.disabled = false; btn.innerText = "SALVAR"; }
    }

    async function compartilharEscala() {
        const dataSel = document.getElementById('dataConsulta').value;
        if (!dataSel) return alert("Selecione a data!");

        try {
            const res = await fetch(`${URL_API}?t=${new Date().getTime()}`);
            const banco = await res.json();
            
            const [ano, mes, dia] = dataSel.split('-');
            const dObj = new Date(ano, mes - 1, dia, 12, 0, 0);
            const dias = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
            const regraHoje = `${Math.ceil(dObj.getDate() / 7)}º ${dias[dObj.getDay()]}`; 

            const extras = banco.extras.filter(r => r[1] && r[1].toString().split('T')[0] === dataSel);
            const fixos = banco.regras.filter(r => r[0].toString().trim().toLowerCase() === regraHoje.toLowerCase());

            if (extras.length === 0 && fixos.length === 0) return alert("Nada encontrado.");

            let msg = "";
            const lista = [
                ...fixos.map(f => ({ h: f[1], m: f[2], n: f[3], o: "" })), 
                ...extras.map(e => ({ h: e[2], m: e[4], n: e[3], o: e[5] }))
            ];

            lista.forEach(item => {
                const horaF = extrairHora(item.h);
                const missaF = limparTotal(item.m);
                const minF = limparTotal(item.n);
                
                // FORMATO EXATO PEDIDO:
                msg += `*📍 NOVA ESCALA - ${regraHoje}*\n`;
                msg += `⏰ *Horário:* ${horaF}\n`;
                msg += `⛪ *Missa:* ${missaF}\n`;
                msg += `👤 *Ministros:* ${minF}\n`;
                if (item.o) msg += `📝 *Obs:* ${limparTotal(item.o)}\n`;
                msg += `─────────────────\n\n`;
            });

            dispararZap(msg);
        } catch (e) { alert("Erro ao carregar."); }
    }
</script>
</body>
</html>

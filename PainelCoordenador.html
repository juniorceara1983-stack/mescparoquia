<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COORDENADOR - MESC</title>
    <style>
        :root { 
            --primary: #0f766e; 
            --bg: #f0fdfa; 
            --accent: #115e59; 
            --success: #25d366;
            --gold: #b45309;
            --muted: #64748b; 
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); padding: 15px; margin: 0; color: #1e293b; }
        
        .container { 
            max-width: 480px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border-top: 10px solid var(--primary); 
        }
        
        h2 { text-align: center; color: var(--accent); margin: 0 0 5px 0; font-size: 22px; }
        p.subtitle { text-align: center; color: var(--muted); margin: 0 0 20px 0; font-size: 14px; }
        
        label { display: block; margin-top: 15px; font-weight: 700; color: #334155; font-size: 14px; }
        
        input, textarea, select { 
            width: 100%; padding: 12px; margin-top: 6px; 
            border: 1px solid #e2e8f0; border-radius: 12px; 
            box-sizing: border-box; font-size: 16px; background: #f8fafc;
        }

        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 14px; 
            font-weight: bold; cursor: pointer; margin-top: 12px; 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            transition: transform 0.2s; font-size: 15px;
        }
        .btn:active { transform: scale(0.98); }

        .btn-primary { background: var(--primary); color: white; }
        .btn-regra { background: #f59e0b; color: white; }
        .btn-zap { background: var(--success); color: white; }
        .btn-outline { background: #f1f5f9; color: var(--muted); border: 1px solid #e2e8f0; }

        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); 
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        
        .modal-content { 
            background: white; padding: 25px; border-radius: 24px; 
            width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; 
            box-shadow: 0 20px 25px rgba(0,0,0,0.2);
        }

        .grid-ministros { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .grid-ministros input { margin-top: 0; padding: 10px; font-size: 14px; }

        .preview-box { 
            background: #f1f5f9; padding: 15px; border-radius: 12px; 
            border: 1px dashed #cbd5e1; white-space: pre-wrap; 
            font-family: monospace; font-size: 13px; margin: 15px 0; 
            color: #334155; max-height: 250px; overflow-y: auto;
        }

        .divider { margin: 25px 0; border-top: 2px solid #f1f5f9; position: relative; }
        .footer-credits { text-align: center; font-size: 11px; color: var(--muted); margin-top: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>COORDENADOR MESC</h2>
    <p class="subtitle">Paróquia PNSPS - Maracanaú</p>
    
    <label>📅 Consultar Escala do Dia</label>
    <input type="date" id="dataConsulta">
    
    <button class="btn btn-zap" id="btnZap" onclick="compartilharEscala()">
        <span>📲</span> VER E ENVIAR ESCALA
    </button>
    
    <div class="divider"></div>
    
    <button class="btn btn-primary" onclick="abrirModal('modalEvento')">
        <span>➕</span> NOVO EVENTO (EXTRA)
    </button>
    
    <button class="btn btn-regra" onclick="abrirModal('modalRegra')">
        <span>⚙️</span> REGRAS FIXAS
    </button>
    
    <div class="footer-credits">By: Jr&Iz</div>
</div>

<div id="modalPreview" class="modal">
    <div class="modal-content">
        <h3 style="margin:0; color:var(--primary)">Resumo da Escala</h3>
        <div id="previewText" class="preview-box"></div>
        <button class="btn btn-zap" onclick="confirmarEnvioZap()">✅ ENVIAR AGORA</button>
        <button class="btn btn-outline" onclick="fecharModal('modalPreview')">CANCELAR</button>
    </div>
</div>

<div id="modalEvento" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">Novo Evento</h3>
        <label>Data</label> <input type="date" id="novaData">
        <label>Hora</label> <input type="time" id="novaHora">
        <label>Evento</label> <input type="text" id="novoEvento" placeholder="Ex: Missa de Sétimo Dia">
        <label>Ministros</label>
        <div class="grid-ministros">
            <input type="text" class="m-input"> <input type="text" class="m-input">
            <input type="text" class="m-input"> <input type="text" class="m-input">
            <input type="text" class="m-input"> <input type="text" class="m-input">
            <input type="text" class="m-input"> <input type="text" class="m-input">
        </div>
        <label>Obs</label> <textarea id="obs" rows="2"></textarea>
        <button class="btn btn-primary" onclick="salvar('addEscala', 'modalEvento')">💾 SALVAR EVENTO</button>
        <button class="btn btn-outline" onclick="fecharModal('modalEvento')">VOLTAR</button>
    </div>
</div>

<div id="modalRegra" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">Regra Fixa</h3>
        <label>Semana e Dia</label>
        <div style="display:flex; gap:5px">
            <select id="numSemana" style="flex:1">
                <option value="1º">1º</option><option value="2º">2º</option>
                <option value="3º">3º</option><option value="4º">4º</option><option value="5º">5º</option>
            </select>
            <select id="diaSemana" style="flex:2">
                <option value="Segunda">Segunda</option><option value="Terça">Terça</option>
                <option value="Quarta">Quarta</option><option value="Quinta">Quinta</option>
                <option value="Sexta">Sexta</option><option value="Sábado">Sábado</option><option value="Domingo">Domingo</option>
            </select>
        </div>
        <label>Hora</label> <input type="time" id="horaFixo">
        <label>Missa</label> <input type="text" id="eventoFixo">
        <label>Ministros</label>
        <div class="grid-ministros">
            <input type="text" class="r-input"> <input type="text" class="r-input">
            <input type="text" class="r-input"> <input type="text" class="r-input">
            <input type="text" class="r-input"> <input type="text" class="r-input">
        </div>
        <button class="btn btn-regra" onclick="salvar('addRegra', 'modalRegra')">💾 SALVAR REGRA</button>
        <button class="btn btn-outline" onclick="fecharModal('modalRegra')">VOLTAR</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbxSlivfWisF_LHXOYaYPx6-RBPsnYcYzBUvxJachwYlXRqAp2P5uje6MR2Zzf7hYB0u/exec";
    let msgFinal = "";

    function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

    function fixText(t) {
        if(!t) return "";
        return t.toString().toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase()).trim();
    }

    async function salvar(acao, modalId) {
        const isE = modalId === 'modalEvento';
        const inputs = document.querySelectorAll(isE ? '.m-input' : '.r-input');
        const listaM = Array.from(inputs).map(i => fixText(i.value)).filter(v => v !== "").join(", ");
        
        const payload = {
            action: acao,
            hora: isE ? document.getElementById('novaHora').value : document.getElementById('horaFixo').value,
            missa: fixText(isE ? document.getElementById('novoEvento').value : document.getElementById('eventoFixo').value),
            ministro: listaM,
            data: isE ? document.getElementById('novaData').value : "",
            obs: isE ? document.getElementById('obs').value : "",
            regra: !isE ? (document.getElementById('numSemana').value + " " + document.getElementById('diaSemana').value) : ""
        };

        try {
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Salvo com sucesso!");
            location.reload();
        } catch (e) { alert("Erro ao salvar."); }
    }

    async function compartilharEscala() {
        const dataSel = document.getElementById('dataConsulta').value;
        if (!dataSel) return alert("Escolha uma data!");
        document.getElementById('btnZap').innerText = "⏳ BUSCANDO...";

        try {
            const res = await fetch(`${URL_API}?t=${new Date().getTime()}`);
            const banco = await res.json();
            const [ano, mes, dia] = dataSel.split('-');
            const dObj = new Date(ano, mes-1, dia, 12, 0, 0);
            const diasS = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
            const regraHoje = `${Math.ceil(dObj.getDate()/7)}º ${diasS[dObj.getDay()]}`; 

            const extras = (banco.extras || []).filter(r => r[1] && r[1].toString().includes(dataSel));
            const fixos = (banco.regras || []).filter(r => r[0] && r[0].toString().trim().toLowerCase() === regraHoje.toLowerCase());

            if (extras.length === 0 && fixos.length === 0) {
                document.getElementById('btnZap').innerHTML = "<span>📲</span> VER E ENVIAR ESCALA";
                return alert("Nada encontrado.");
            }

            msgFinal = `*📍 ESCALA - ${dia}/${mes}/${ano}*\n*(${regraHoje})*\n\n`;
            const listaG = [
                ...fixos.map(f => ({ h: f[1], m: f[2], n: f[3] })), 
                ...extras.map(e => ({ h: e[2], m: e[4], n: e[3] }))
            ].sort((a, b) => a.h.localeCompare(b.h));

            listaG.forEach(it => {
                msgFinal += `⏰ *Hora:* ${it.h}\n⛪ *Missa:* ${fixText(it.m)}\n👤 *Ministros:* ${fixText(it.n)}\n─────────────────\n\n`;
            });

            document.getElementById('previewText').innerText = msgFinal;
            abrirModal('modalPreview');

        } catch (e) { alert("Erro ao ler dados."); }
        document.getElementById('btnZap').innerHTML = "<span>📲</span> VER E ENVIAR ESCALA";
    }

    function confirmarEnvioZap() {
        window.location.href = `whatsapp://send?text=${encodeURIComponent(msgFinal)}`;
        fecharModal('modalPreview');
    }
</script>
</body>
</html>

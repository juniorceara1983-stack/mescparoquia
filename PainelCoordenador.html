<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - MESC</title>
    <style>
        :root { --primary: #1e3a8a; --bg: #f1f5f9; --success: #25d366; --gold: #b45309; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 480px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        h2 { text-align: center; color: var(--primary); margin: 0 0 5px 0; }
        p.subtitle { text-align: center; color: #64748b; margin: 0 0 20px 0; font-size: 14px; }
        label { display: block; margin-top: 15px; font-weight: 700; color: #475569; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-regra { background: var(--gold); color: white; }
        .btn-zap { background: var(--success); color: white; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .grid-ministros { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .footer-credits { text-align: center; font-size: 10px; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>COORDENADOR MESC</h2>
    <p class="subtitle">Paróquia PNSPS - Maracanaú</p>
    
    <label>📅 Consultar Escala do Dia</label>
    <input type="date" id="dataConsulta">
    <button class="btn btn-zap" onclick="compartilharEscala()">📲 ENVIAR PARA WHATSAPP</button>

    <div style="margin: 25px 0; border-top: 2px solid #eee;"></div>

    <button class="btn btn-primary" onclick="abrirModal('modalEvento')">➕ NOVO EVENTO (EXTRA)</button>
    <button class="btn btn-regra" onclick="abrirModal('modalRegra')">⚙️ REGRAS FIXAS</button>
    
    <div class="footer-credits">By: Jr&Iz</div>
</div>

<div id="modalEvento" class="modal">
    <div class="modal-content">
        <button onclick="fecharModal('modalEvento')" style="border:none; background:none; font-weight:bold; cursor:pointer; color:var(--primary);">⬅ Voltar</button>
        <h3>Missa ou Evento Extra</h3>
        <label>Data do Evento</label> <input type="date" id="novaData">
        <label>Horário</label> <input type="time" id="novaHora">
        <label>Nome da Missa / Evento</label> <input type="text" id="novoEvento" placeholder="Ex: Missa de Sétimo Dia">
        <label>Ministros Escalados</label>
        <div class="grid-ministros">
            <input type="text" class="m-input" placeholder="1"> <input type="text" class="m-input" placeholder="2">
            <input type="text" class="m-input" placeholder="3"> <input type="text" class="m-input" placeholder="4">
            <input type="text" class="m-input" placeholder="5"> <input type="text" class="m-input" placeholder="6">
        </div>
        <label>Observações</label> <textarea id="obs" rows="2"></textarea>
        <button class="btn btn-primary" id="btnSalvarExtra" onclick="salvarNaPlanilha('addEscala', 'modalEvento')">💾 SALVAR NA PLANILHA</button>
    </div>
</div>

<div id="modalRegra" class="modal">
    <div class="modal-content">
        <button onclick="fecharModal('modalRegra')" style="border:none; background:none; font-weight:bold; cursor:pointer; color:var(--gold);">⬅ Voltar</button>
        <h3>Configurar Regra Fixa</h3>
        <label>Selecione a Regra</label>
        <select id="regraFixo">
            <option value="1º Sábado">1º Sábado</option><option value="2º Sábado">2º Sábado</option>
            <option value="3º Sábado">3º Sábado</option><option value="4º Sábado">4º Sábado</option>
            <option value="1º Domingo">1º Domingo</option><option value="2º Domingo">2º Domingo</option>
            <option value="3º Domingo">3º Domingo</option><option value="4º Domingo">4º Domingo</option>
        </select>
        <label>Horário Fixo</label> <input type="time" id="horaFixo">
        <label>Nome do Evento</label> <input type="text" id="eventoFixo" placeholder="Ex: Missa Dominical">
        <label>Ministros da Equipe</label>
        <div class="grid-ministros">
            <input type="text" class="r-input" placeholder="1"> <input type="text" class="r-input" placeholder="2">
            <input type="text" class="r-input" placeholder="3"> <input type="text" class="r-input" placeholder="4">
            <input type="text" class="r-input" placeholder="5"> <input type="text" class="r-input" placeholder="6">
        </div>
        <button class="btn btn-regra" id="btnSalvarRegra" onclick="salvarNaPlanilha('addRegra', 'modalRegra')">💾 SALVAR REGRA</button>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbz4HkqqwosJnPdRTBdNC0wL9tsSxz5YDRphQX-VDPtWq2FUlmPLAIC05hYlBUJTkk_y/exec";

    function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

    function limpar(t) { 
        return t ? t.toString().replace(/[\r\n]+/g, " ").replace(/\s\s+/g, " ").trim() : ""; 
    }

    async function salvarNaPlanilha(acao, modalId) {
        const isExtra = modalId === 'modalEvento';
        const inputs = document.querySelectorAll(isExtra ? '.m-input' : '.r-input');
        const ministros = Array.from(inputs).map(i => limpar(i.value)).filter(v => v !== "").join(", ");
        
        const payload = {
            action: acao,
            hora: isExtra ? document.getElementById('novaHora').value : document.getElementById('horaFixo').value,
            missa: limpar(isExtra ? document.getElementById('novoEvento').value : document.getElementById('eventoFixo').value),
            ministro: ministros
        };

        if (isExtra) {
            payload.data = document.getElementById('novaData').value;
            payload.obs = limpar(document.getElementById('obs').value);
        } else {
            payload.regra = document.getElementById('regraFixo').value;
        }

        const btn = document.querySelector(`#${modalId} .btn`);
        btn.innerText = "⏳ SALVANDO..."; btn.disabled = true;

        try {
            await fetch(URL_API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Enviado com sucesso!");
            location.reload();
        } catch (e) {
            alert("Erro ao salvar.");
            btn.disabled = false; btn.innerText = "TENTAR NOVAMENTE";
        }
    }

    async function compartilharEscala() {
        const dataSel = document.getElementById('dataConsulta').value;
        if (!dataSel) return alert("Escolha uma data!");

        try {
            const res = await fetch(`${URL_API}?t=${new Date().getTime()}`);
            const banco = await res.json();
            
            const [ano, mes, dia] = dataSel.split('-');
            const dObj = new Date(ano, mes - 1, dia, 12, 0, 0);
            const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
            const regraHoje = `${Math.ceil(dObj.getDate() / 7)}º ${diasSemana[dObj.getDay()]}`; 

            // Filtro Extras (Aba Lançamentos) - Data está na coluna B (índice 1)
            const extras = banco.extras.filter(r => r[1] && r[1].toString().includes(dataSel));
            
            // Filtro Regras (Aba Escala_Fixa) - Regra está na coluna A (índice 0)
            const fixos = banco.regras.filter(r => r[0] && r[0].toString().trim().toLowerCase() === regraHoje.toLowerCase());

            if (extras.length === 0 && fixos.length === 0) return alert("Nada para " + regraHoje);

            let msg = `*📍 ESCALA - ${dia}/${mes}/${ano}*\n\n`;
            
            const lista = [
                ...fixos.map(f => ({ h: f[1], m: f[2], n: f[3], r: regraHoje })), 
                ...extras.map(e => ({ h: e[2], m: e[4], n: e[3], r: "EXTRA" }))
            ];

            lista.forEach(item => {
                msg += `⏰ *Hora:* ${item.h}\n⛪ *Missa:* ${limpar(item.m)}\n👤 *Ministros:* ${limpar(item.n)}\n─────────────────\n\n`;
            });

            window.location.href = `whatsapp://send?text=${encodeURIComponent(msg)}`;
        } catch (e) { alert("Erro ao buscar dados."); }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - MESC Pro Plus - Gestão de Escalas</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { 
            --primary: #1e3a8a; 
            --bg: #f1f5f9; 
            --success: #25d366; 
            --pdf: #e11d48; 
            --gold: #b45309; 
            --white: #ffffff;
            --slate: #475569;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            padding: 15px; 
            margin: 0; 
            color: #1e293b;
        }
        
        .container { 
            max-width: 480px; 
            margin: 20px auto; 
            background: var(--white); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.15); 
            border-top: 12px solid var(--primary); 
        }
        
        .header { 
            text-align: center; 
            margin-bottom: 25px; 
        }

        .header h2 {
            color: var(--primary);
            margin: 0;
            letter-spacing: 1px;
            font-size: 1.6rem;
        }

        .header p {
            color: var(--slate);
            font-size: 0.95rem;
            margin-top: 5px;
        }
        
        label { 
            display: block; 
            margin-top: 15px; 
            font-weight: 700; 
            font-size: 0.9rem; 
            color: var(--slate); 
        }
        
        input, textarea, select { 
            width: 100%; 
            padding: 14px; 
            margin-top: 8px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            background: #f8fafc; 
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            background: var(--white);
        }

        .btn { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-regra { background: var(--gold); color: white; }
        .btn-zap { background: var(--success); color: white; }
        .btn-pdf { background: var(--pdf); color: white; }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn:active { transform: scale(0.97); }

        /* Estilos dos Modais */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(5px); 
            align-items: center; 
            justify-content: center; 
        }
        
        .modal-content { 
            background: var(--white); 
            padding: 25px; 
            border-radius: 25px; 
            width: 92%; 
            max-width: 450px; 
            max-height: 85vh; 
            overflow-y: auto; 
            position: relative; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .grid-ministros { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 12px; 
            background: #f1f5f9;
            padding: 15px;
            border-radius: 15px;
        }
        
        .grid-ministros input { 
            padding: 10px; 
            font-size: 0.85rem; 
            border: 1px solid #cbd5e1;
            margin-top: 0;
        }
        
        .modal-footer { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 20px; 
        }
        
        .signature { 
            text-align: center; 
            margin-top: 30px; 
            font-size: 0.75rem; 
            color: #94a3b8; 
            font-weight: 600;
        }

        .divider {
            margin: 30px 0;
            border-top: 2px dashed #e2e8f0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>COORDENADOR MESC</h2>
        <p>Paróquia PNSPS - Maracanaú</p>
    </div>

    <div class="section">
        <label for="dataConsulta">Consultar Escala do Dia</label>
        <input type="date" id="dataConsulta">
        
        <button class="btn btn-zap" onclick="compartilharEscala()">
            <span>📲</span> ENVIAR PARA WHATSAPP
        </button>
    </div>

    <div class="divider"></div>

    <div class="section">
        <button class="btn btn-primary" onclick="abrirModal('modalEvento')">
            <span>➕</span> NOVO EVENTO (EXTRA)
        </button>
        
        <button class="btn btn-regra" onclick="abrirModal('modalRegra')">
            <span>⚙️</span> GERENCIAR REGRAS FIXAS
        </button>
    </div>
    
    <div class="signature">Desenvolvido por: Jr & Iz</div>
</div>

<div id="modalEvento" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button onclick="fecharModal('modalEvento')" style="background:none; border:none; cursor:pointer; color:var(--primary); font-weight:bold; font-size:1.1rem;">⬅ Voltar</button>
            <h3 style="color:var(--primary); margin:0;">Novo Evento Extra</h3>
        </div>
        
        <label>Data do Evento</label>
        <input type="date" id="novaData">
        
        <label>Horário</label>
        <input type="time" id="novaHora">
        
        <label>Nome da Missa / Evento</label>
        <input type="text" id="novoEvento" placeholder="Ex: Missa de Sétimo Dia">

        <label>Ministros Escalados (Até 10)</label>
        <div class="grid-ministros">
            <input type="text" class="m-input" placeholder="1. Nome">
            <input type="text" class="m-input" placeholder="2. Nome">
            <input type="text" class="m-input" placeholder="3. Nome">
            <input type="text" class="m-input" placeholder="4. Nome">
            <input type="text" class="m-input" placeholder="5. Nome">
            <input type="text" class="m-input" placeholder="6. Nome">
            <input type="text" class="m-input" placeholder="7. Nome">
            <input type="text" class="m-input" placeholder="8. Nome">
            <input type="text" class="m-input" placeholder="9. Nome">
            <input type="text" class="m-input" placeholder="10. Nome">
        </div>

        <label>Observações Importantes</label>
        <textarea id="obs" rows="3" placeholder="Ex: Cor litúrgica, avisos..."></textarea>

        <div class="modal-footer">
            <button class="btn btn-pdf" onclick="gerarPDFInstantaneo('modalEvento')">
                <span>📄</span> PDF
            </button>
            <button class="btn btn-zap" onclick="compartilharEscalaRapida('modalEvento')">
                <span>📲</span> Zap
            </button>
        </div>

        <button class="btn btn-primary" id="btnSalvar" onclick="salvarEscala('addEscala', 'modalEvento')">
            <span>💾</span> SALVAR NA PLANILHA
        </button>
    </div>
</div>

<div id="modalRegra" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button onclick="fecharModal('modalRegra')" style="background:none; border:none; cursor:pointer; color:var(--gold); font-weight:bold; font-size:1.1rem;">⬅ Voltar</button>
            <h3 style="color:var(--gold); margin:0;">Regra de Escala Fixa</h3>
        </div>
        
        <label>Frequência da Regra</label>
        <select id="regraFixo">
            <option value="1º Sábado">1º Sábado</option>
            <option value="2º Sábado">2º Sábado</option>
            <option value="3º Sábado">3º Sábado</option>
            <option value="4º Sábado">4º Sábado</option>
            <option value="1º Domingo">1º Domingo</option>
            <option value="2º Domingo">2º Domingo</option>
            <option value="3º Domingo">3º Domingo</option>
            <option value="4º Domingo">4º Domingo</option>
        </select>

        <label>Horário Padrão</label>
        <input type="time" id="horaFixo">
        
        <label>Nome do Evento Fixo</label>
        <input type="text" id="eventoFixo" placeholder="Ex: Missa com Crianças">

        <label>Ministros Fixos (Até 10)</label>
        <div class="grid-ministros">
            <input type="text" class="r-input" placeholder="1. Nome">
            <input type="text" class="r-input" placeholder="2. Nome">
            <input type="text" class="r-input" placeholder="3. Nome">
            <input type="text" class="r-input" placeholder="4. Nome">
            <input type="text" class="r-input" placeholder="5. Nome">
            <input type="text" class="r-input" placeholder="6. Nome">
            <input type="text" class="r-input" placeholder="7. Nome">
            <input type="text" class="r-input" placeholder="8. Nome">
            <input type="text" class="r-input" placeholder="9. Nome">
            <input type="text" class="r-input" placeholder="10. Nome">
        </div>

        <div class="modal-footer">
            <button class="btn btn-pdf" onclick="gerarPDFInstantaneo('modalRegra')">
                <span>📄</span> PDF
            </button>
            <button class="btn btn-zap" onclick="compartilharEscalaRapida('modalRegra')">
                <span>📲</span> Zap
            </button>
        </div>

        <button class="btn btn-regra" id="btnSalvarRegra" onclick="salvarEscala('addRegra', 'modalRegra')">
            <span>💾</span> SALVAR REGRA FIXA
        </button>
    </div>
</div>

<script>
    // URL da API do Google Apps Script
    const URL_API = "https://script.google.com/macros/s/AKfycbzwaZk-NZE0omqUf2PrU08c_-gi0H4yuxFqFFL7A5RKKilXSQcsBU-P-lAZMAd-vg0C/exec";

    /**
     * Funções de Controle de Interface
     */
    function abrirModal(id) { 
        document.getElementById(id).style.display = 'flex'; 
    }

    function fecharModal(id) { 
        document.getElementById(id).style.display = 'none'; 
    }

    /**
     * Limpeza e formatação de texto para evitar erros de quebra de linha
     */
    function limparTexto(txt) {
        if (!txt) return "";
        return txt.toString()
            .replace(/\r?\n|\r/g, " ") // Remove quebras de linha
            .replace(/\s+/g, " ")      // Remove espaços duplos
            .trim();
    }

    /**
     * Extração segura de horário para evitar o erro do "10:06"
     */
    function extrairHoraSegura(valor) {
        if (!valor) return "00:00";
        let s = valor.toString();
        
        // Se vier no formato ISO do Google (T10:06:00Z)
        if (s.includes("T")) {
            s = s.split("T")[1];
        }
        
        // Tenta encontrar o padrão 00:00 na string
        const match = s.match(/\d{2}:\d{2}/);
        if (match) return match[0];
        
        // Fallback: pega os 5 primeiros caracteres
        return s.substring(0, 5);
    }

    /**
     * Coleta dados dos inputs dos modais
     */
    function obterDadosDoModal(modalId) {
        const isExtra = modalId === 'modalEvento';
        const seletor = isExtra ? '.m-input' : '.r-input';
        
        const inputs = document.querySelectorAll(seletor);
        const listaMinistros = Array.from(inputs)
            .map(i => i.value.trim())
            .filter(v => v !== "")
            .join(", ");

        return {
            data: isExtra ? document.getElementById('novaData').value : document.getElementById('regraFixo').value,
            hora: isExtra ? document.getElementById('novaHora').value : document.getElementById('horaFixo').value,
            missa: limparTexto(isExtra ? document.getElementById('novoEvento').value : document.getElementById('eventoFixo').value),
            ministro: listaMinistros,
            obs: isExtra ? limparTexto(document.getElementById('obs').value) : ""
        };
    }

    /**
     * Envia dados para o Google Sheets
     */
    async function salvarEscala(acao, modalId) {
        const btnId = modalId === 'modalEvento' ? 'btnSalvar' : 'btnSalvarRegra';
        const btn = document.getElementById(btnId);
        const d = obterDadosDoModal(modalId);

        if (!d.hora || !d.missa) {
            return alert("Por favor, preencha o Horário e o Nome da Missa.");
        }

        const textoOriginal = btn.innerText;
        btn.innerText = "⏳ SALVANDO...";
        btn.disabled = true;

        const payload = { 
            action: acao, 
            ...d 
        };

        if (acao === 'addRegra') {
            payload.regra = d.data;
            delete payload.data;
        }

        try {
            // Enviando via POST (Modo no-cors para Google Script)
            await fetch(URL_API, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(payload) 
            });
            
            alert("✅ Dados enviados com sucesso para a planilha!");
            location.reload();
        } catch (error) {
            console.error("Erro ao salvar:", error);
            alert("❌ Erro ao conectar com a planilha.");
            btn.disabled = false;
            btn.innerText = textoOriginal;
        }
    }

    /**
     * Lógica Principal: Consulta e Envio via WhatsApp
     */
    async function compartilharEscala() {
        const dataSel = document.getElementById('dataConsulta').value;
        if (!dataSel) return alert("Selecione uma data para consultar.");

        try {
            // Busca dados com timestamp para evitar cache do celular
            const res = await fetch(`${URL_API}?t=${new Date().getTime()}`);
            const bancoDados = await res.json();
            
            // Tratamento da Data selecionada
            const partesData = dataSel.split('-');
            const ano = partesData[0];
            const mes = partesData[1];
            const dia = partesData[2];
            
            const dataObjeto = new Date(ano, mes - 1, dia, 12, 0, 0);
            const diasSemana = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
            const diaSemanaNome = diasSemana[dataObjeto.getDay()];
            const ordemMes = Math.ceil(dataObjeto.getDate() / 7);
            const regraHoje = `${ordemMes}º ${diaSemanaNome}`; 

            // Filtros Blindados
            const extrasEncontrados = bancoDados.extras.filter(row => {
                if (!row[1]) return false;
                // Compara apenas a parte AAAA-MM-DD da data da planilha
                return row[1].toString().split('T')[0] === dataSel;
            });

            const regrasEncontradas = bancoDados.regras.filter(row => {
                if (!row[0]) return false;
                return row[0].toString().trim().toLowerCase() === regraHoje.toLowerCase();
            });

            if (extrasEncontrados.length === 0 && regrasEncontradas.length === 0) {
                return alert("Nenhuma escala encontrada para esta data.");
            }

            // Montagem da Mensagem
            let mensagemZap = `*📍 ESCALA MESC - ${dia}/${mes}/${ano}*\n`;
            mensagemZap += `*(${regraHoje})*\n\n`;

            // Consolidação de todos os horários do dia
            const listaEscalas = [
                ...regrasEncontradas.map(r => ({ hora: r[1], missa: r[2], min: r[3], obs: "" })), 
                ...extrasEncontrados.map(e => ({ hora: e[2], missa: e[4], min: e[3], obs: e[5] }))
            ];

            // Ordenar por horário
            listaEscalas.sort((a, b) => a.hora.toString().localeCompare(b.hora.toString()));

            listaEscalas.forEach(item => {
                const horaFormatada = extrairHoraSegura(item.hora);
                const ministros = limparTexto(item.min);
                const evento = limparTexto(item.missa);
                
                // Link para o Google Agenda
                const dataGCal = dataSel.replace(/-/g, '');
                const horaGCal = horaFormatada.replace(':', '');
                const linkAgenda = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('MESC: ' + evento)}&dates=${dataGCal}T${horaGCal}00/${dataGCal}T${horaGCal}00&details=${encodeURIComponent('Ministros: ' + ministros)}`;

                mensagemZap += `⏰ *${horaFormatada}* - ${evento}\n`;
                mensagemZap += `👥 *Ministros:* ${ministros}\n`;
                if (item.obs) mensagemZap += `📝 *Obs:* ${limparTexto(item.obs)}\n`;
                mensagemZap += `📅 *Salvar na Agenda:* ${linkAgenda}\n`;
                mensagemZap += `─────────────────\n\n`;
            });

            // Envio usando o seletor nativo do celular (igual ao seu novo arquivo)
            if (navigator.share) {
                navigator.share({
                    title: 'Escala de Ministros',
                    text: mensagemZap
                }).catch(err => {
                    window.open(`https://wa.me/?text=${encodeURIComponent(mensagemZap)}`);
                });
            } else {
                window.open(`https://wa.me/?text=${encodeURIComponent(mensagemZap)}`);
            }

        } catch (error) {
            console.error("Erro na consulta:", error);
            alert("Erro ao carregar escala. Tente novamente em instantes.");
        }
    }

    /**
     * Gera PDF das escalas individuais dos modais
     */
    function gerarPDFInstantaneo(modalId) {
        const d = obterDadosDoModal(modalId);
        if (!d.hora || !d.missa) return alert("Preencha os dados básicos.");
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(20);
        doc.setTextColor(30, 58, 138);
        doc.text("ESCALA DE MINISTROS", 105, 25, { align: 'center' });
        
        doc.setLineWidth(0.5);
        doc.line(20, 30, 190, 30);
        
        doc.setFontSize(14);
        doc.setTextColor(0, 0, 0);
        doc.text(`Referência: ${d.data}`, 20, 45);
        doc.text(`Horário: ${d.hora}`, 20, 55);
        doc.text(`Missa/Evento: ${d.missa}`, 20, 65);
        
        doc.setFontSize(16);
        doc.text("Ministros Escalados:", 20, 85);
        
        doc.setFontSize(12);
        const splitMinistros = doc.splitTextToSize(d.ministro, 170);
        doc.text(splitMinistros, 20, 95);
        
        if (d.obs) {
            doc.text("Observações:", 20, 130);
            doc.text(doc.splitTextToSize(d.obs, 170), 20, 140);
        }
        
        doc.save(`Escala_${d.data}_${d.hora}.pdf`);
    }

    /**
     * Envio rápido via WhatsApp dentro dos modais
     */
    function compartilharEscalaRapida(modalId) {
        const d = obterDadosDoModal(modalId);
        if (!d.hora || !d.missa) return alert("Preencha Horário e Missa.");
        
        const ref = d.data.includes('-') ? d.data.split('-').reverse().join('/') : d.data;
        let texto = `*📍 NOVA ESCALA - ${ref}*\n`;
        texto += `⏰ *Horário:* ${d.hora}\n`;
        texto += `⛪ *Missa:* ${d.missa}\n`;
        texto += `👥 *Ministros:* ${d.ministro}`;
        
        if (d.obs) texto += `\n📝 *Obs:* ${d.obs}`;
        
        if (navigator.share) {
            navigator.share({ text: texto }).catch(() => {
                window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
            });
        } else {
            window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3a8a">
    <title>MESC — Gestão de Escalas</title>
    <style>
        :root { --primary: #1e3a8a; --bg: #f1f5f9; --teal: #0f766e; --gold: #b45309; --red: #b91c1c; --green: #15803d; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 16px; min-height: 100vh; }
        .wrap { max-width: 480px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0 8px; }
        header h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        header p { margin: 8px 0 0; color: #64748b; font-size: 14px; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; color: #fff; }
        .btn-blue { background: var(--primary); }
        .btn-teal { background: var(--teal); }
        .btn-pdf { background: #475569; }
        .btn-zap { background: var(--green); }
        
        .section { margin-top: 20px; padding-top: 15px; border-top: 2px solid #e2e8f0; }
        .section h2 { font-size: 13px; text-transform: uppercase; color: #475569; margin-bottom: 12px; }
        
        textarea { width: 100%; border-radius: 12px; border: 1px solid #cbd5e1; padding: 12px; margin-top: 8px; font-family: inherit; resize: vertical; }

        /* Estilo do Modal (Janela Flutuante) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal.open { display: flex; }
        .modal-content { background: #fff; border-radius: 16px; width: 100%; max-width: 400px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-weight: bold; font-size: 18px; color: var(--primary); margin-bottom: 15px; display: flex; justify-content: space-between; }
        .slot-input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .footer { text-align: center; font-size: 10px; color: #94a3b8; margin-top: 30px; }
    </style>
</head>
<body>

<div class="wrap">
    <header>
        <h1>MESC</h1>
        <p>Paróquia PNSPS — Maracanaú</p>
    </header>

    <div class="section">
        <a class="btn btn-blue" href="PainelCoordenador.html">⚙️ Painel do coordenador</a>
    </div>

    <div class="section">
        <h2>Escala Fixa</h2>
        <button class="btn btn-teal" onclick="openModal('modalFixa')">📝 Criar escala fixa</button>
        <button class="btn btn-pdf" onclick="alert('Gerando PDF Fixa...')">📄 Baixar PDF escala fixa</button>
        <button class="btn btn-zap" onclick="enviarZap('Fixa')">📲 Enviar escala ZAP fixo</button>
    </div>

    <div class="section">
        <h2>Escala Extra</h2>
        <button class="btn btn-teal" onclick="openModal('modalExtra')">📝 Criar escala extra</button>
        <button class="btn btn-pdf" onclick="alert('Gerando PDF Extra...')">📄 Baixar PDF escala extra</button>
        <button class="btn btn-zap" onclick="enviarZap('Extra')">📲 Enviar escala ZAP extra</button>
    </div>

    <div class="section">
        <h2>Add comentário</h2>
        <textarea rows="3" placeholder="Digite aqui observações importantes..."></textarea>
    </div>

    <div class="footer">By: Jr&amp;Iz</div>
</div>

<div id="modalFixa" class="modal" onclick="closeModal('modalFixa')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">Escala Fixa (10 Slots)</div>
        <div id="slotsFixa"></div>
        <button class="btn btn-blue" onclick="closeModal('modalFixa')">Salvar</button>
    </div>
</div>

<div id="modalExtra" class="modal" onclick="closeModal('modalExtra')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">Escala Extra (10 Slots)</div>
        <div id="slotsExtra"></div>
        <button class="btn btn-blue" onclick="closeModal('modalExtra')">Salvar</button>
    </div>
</div>

<script>
    // Gerar os 10 campos de nomes para cada modal
    function generateSlots(containerId) {
        const container = document.getElementById(containerId);
        for (let i = 1; i <= 10; i++) {
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Nome ' + i;
            input.className = 'slot-input';
            container.appendChild(input);
        }
    }

    generateSlots('slotsFixa');
    generateSlots('slotsExtra');

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function enviarZap(tipo) {
        const msg = encodeURIComponent("MESC Maracanaú: Escala " + tipo + " atualizada!");
        window.location.href = "whatsapp://send?text=" + msg;
    }
</script>

</body>
</html>
